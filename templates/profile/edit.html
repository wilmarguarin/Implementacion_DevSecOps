{% extends "base.html" %}
{% block title %}Edit Profile — NovaCorp{% endblock %}
{% block breadcrumb %}
<nav aria-label="breadcrumb">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="/dashboard">Dashboard</a></li>
        <li class="breadcrumb-item active">Edit Profile</li>
    </ol>
</nav>
{% endblock %}
{% block content %}
<h2><i class="bi bi-pencil-square"></i> Edit Profile</h2>
<div class="card mt-3">
    <div class="card-body">
        <form method="post" action="/profile/edit">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input id="username" class="form-control" type="text" name="username" value="{{ user['username'] }}" required>
            </div>

            <input type="hidden" name="role" value="{{ user['role'] }}">

            <button class="btn btn-primary" type="submit"><i class="bi bi-save"></i> Save Changes</button>
            <a href="/dashboard" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
