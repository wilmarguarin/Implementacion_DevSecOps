{% extends "base.html" %}
{% block title %}Register Company — NovaCorp{% endblock %}
{% block breadcrumb %}
<nav aria-label="breadcrumb">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="/dashboard">Dashboard</a></li>
        <li class="breadcrumb-item"><a href="/companies">Companies</a></li>
        <li class="breadcrumb-item active">Register</li>
    </ol>
</nav>
{% endblock %}
{% block content %}
<h2>Register New Company</h2>
<div class="card mt-3">
    <div class="card-body">
        <form method="post">
            <div class="mb-3">
                <label class="form-label">Company Name</label>
                <input class="form-control" type="text" name="company_name" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea class="form-control" name="description" rows="3" required></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Owner (username)</label>
                <input class="form-control" type="text" name="owner" required>
            </div>
            <button class="btn btn-success" type="submit"><i class="bi bi-plus-circle"></i> Register</button>
            <a href="/companies" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
