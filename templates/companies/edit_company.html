{% extends "base.html" %} 
{% block title %}Edit Company — NovaCorp{% endblock %}
{% block breadcrumb %}
<nav aria-label="breadcrumb">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="/dashboard">Dashboard</a></li>
        <li class="breadcrumb-item"><a href="/companies">Companies</a></li>
        <li class="breadcrumb-item"><a href="/companies/{{ company['id'] }}">{{ company['name'] }}</a></li>
        <li class="breadcrumb-item active">Edit</li>
    </ol>
</nav>
{% endblock %}
{% block content %}
<h2>Edit Company</h2>
<div class="card mt-3">
    <div class="card-body">
        <form method="post" action="/companies/{{ company['id'] }}/edit">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="mb-3">
                <label for="company_name" class="form-label">Company Name</label>
                <input id="company_name" class="form-control" type="text" name="company_name" value="{{ company['name'] }}" required>
            </div>
            <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <textarea id="description" class="form-control" name="description" rows="3" required>{{ company['description'] }}</textarea>
            </div>
            <button class="btn btn-primary" type="submit"><i class="bi bi-save"></i> Save Changes</button>
            <a href="/companies/{{ company['id'] }}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
